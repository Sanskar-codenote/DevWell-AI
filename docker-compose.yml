# ─── DevWell Production Docker Compose ─────────────────────────────────────────
# Usage:
#   1. cp .env.docker.example .env
#   2. Fill in ALL values in .env
#   3. docker compose up -d --build

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M

  backend:
    build:
      context: ./backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: ${BACKEND_PORT}
      JWT_SECRET: ${JWT_SECRET}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db
      DB_NAME: ${DB_NAME}
      DB_PORT: ${DB_PORT:-5432}
      DB_POOL_MAX: ${DB_POOL_MAX:-20}
      FRONTEND_PORT: ${FRONTEND_PORT:-80}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      EXTENSION_ID: ${EXTENSION_ID:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${BACKEND_PORT}/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M

  frontend:
    build:
      context: ./frontend
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    environment:
      FRONTEND_PORT: ${FRONTEND_PORT:-80}
      BACKEND_PORT: ${BACKEND_PORT}
    ports:
      - "${FRONTEND_PORT:-80}:${FRONTEND_PORT:-80}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${FRONTEND_PORT:-80}/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M

volumes:
  postgres_data:
